<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ElectroTest — Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f7fb;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #d8e0ea;
    --accent: #2563eb;
    --accent2: #0f766e;
    --text: #142033;
    --muted: #667085;
    --success: #2ecc71;
    --danger: #e74c3c;
    --font-display: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at top, rgba(37,99,235,0.08), transparent 30%),
      radial-gradient(circle at bottom right, rgba(15,118,110,0.06), transparent 28%);
    pointer-events: none;
    z-index: 0;
  }

  .register-container {
    position: relative;
    z-index: 10;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px 40px;
    border-radius: 12px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
  }

  .register-container h1 {
    font-family: var(--font-display);
    font-size: 40px;
    letter-spacing: 3px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .register-sub {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 14px;
    transition: all 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg);
  }

  .form-group button {
    width: 100%;
    padding: 12px 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .form-group button:hover {
    background: var(--accent2);
  }

  .login-link {
    text-align: center;
    margin-top: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .login-link a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
    transition: all 0.2s;
  }

  .login-link a:hover {
    color: var(--accent2);
    border-color: var(--accent2);
  }

  .message {
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .message.success {
    background: rgba(46, 204, 113, 0.1);
    color: var(--success);
    border: 1px solid rgba(46, 204, 113, 0.3);
  }

  .message.error {
    background: rgba(231, 76, 60, 0.1);
    color: var(--danger);
    border: 1px solid rgba(231, 76, 60, 0.3);
  }
  
  @media (max-width: 768px) {
    body { align-items: stretch; padding: 16px; }
    .register-container { max-width: none; padding: 32px 20px; border-radius: 14px; }
    .register-container h1 { font-size: 32px; }
    .form-group input, .form-group select { font-size: 16px; }
    .form-group button { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="register-container">
  <h1>REGISTER</h1>
  <p class="register-sub">Create your account</p>
  <div id="message-container"></div>
  <form id="register-form">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required />
    </div>
    <div class="form-group">
      <label for="role">Account Type</label>
      <select id="role" name="role" required>
        <option value="">Select account type</option>
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
    </div>
    <div class="form-group">
      <button type="submit">REGISTER NOW</button>
    </div>
  </form>
  <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../src/js/core/supabase.js"></script>
<script src="../../src/data/questions.js"></script>
<script src="../../src/data/asian_book_questions.js"></script>
<script src="../../src/js/core/app.js"></script>
<script src="../../src/js/pages/register.js"></script>
</body>
</html>
