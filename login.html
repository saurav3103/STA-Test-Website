<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ElectroTest — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --surface: #111418;
    --surface2: #1a1f27;
    --border: #252b36;
    --accent: #f5a623;
    --accent2: #e8380d;
    --text: #e8eaf0;
    --muted: #6b7585;
    --success: #2ecc71;
    --danger: #e74c3c;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,166,35,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .login-container {
    position: relative;
    z-index: 10;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px 40px;
    border-radius: 12px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }

  .login-container h1 {
    font-family: var(--font-display);
    font-size: 40px;
    letter-spacing: 3px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .login-sub {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 14px;
    transition: all 0.2s;
  }

  .form-group input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg);
  }

  .form-group button {
    width: 100%;
    padding: 12px 16px;
    background: var(--accent2);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .form-group button:hover {
    background: var(--accent);
  }

  .register-link {
    text-align: center;
    margin-top: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .register-link a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
    transition: all 0.2s;
  }

  .register-link a:hover {
    color: var(--accent2);
    border-color: var(--accent2);
  }

  .message {
    padding: 12px 16px;
    border-radius: 6px;
    margin-bottom: 16px;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .message.success {
    background: rgba(46, 204, 113, 0.1);
    color: var(--success);
    border: 1px solid rgba(46, 204, 113, 0.3);
  }

  .message.error {
    background: rgba(231, 76, 60, 0.1);
    color: var(--danger);
    border: 1px solid rgba(231, 76, 60, 0.3);
  }
</style>
</head>
<body>

<div class="login-container">
  <h1>LOGIN</h1>
  <p class="login-sub">Access your account</p>
  <div id="message-container"></div>
  <form id="login-form">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required />
    </div>
    <div class="form-group">
      <button type="submit">LOGIN NOW</button>
    </div>
  </form>
  <p class="register-link">Don't have an account? <a href="register.html">Register</a></p>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
<script src="login.js"></script>
</body>
</html>
